<html lang="fr">
<head>

    <style>
        :root {
            --gold: #D4AF37;
            --btn-height: 38px; /* Leicht erhöht für bessere Bedienung auf großen Displays */
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Responsiver Container für 6,9 bis 7,9 Zoll */
        .app-container {
            width: 95%;
            max-width: 420px; /* Perfekte Breite für große Smartphones und kleine Tablets */
            min-height: 80vh;
            background: radial-gradient(circle at center, #0c1a2b 0%, #000 100%);
            border: 4px solid var(--gold);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9), 0 0 20px rgba(212, 175, 55, 0.2);
            border-radius: 60px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Verteilt Elemente gleichmäßig */
            padding-top: 20px;
            padding-bottom: 25px;
            box-sizing: border-box;
        }

        header {
            padding: 5px 0;
            text-align: center;
            position: relative;
        }

        .ornament-l, .ornament-r {
            position: absolute;
            top: 28px;
            color: var(--gold);
            font-size: 1.4em;
            opacity: 0.7;
        }
        .ornament-l { left: 40px; }
        .ornament-r { right: 40px; }

        header h1 { color: var(--gold); margin: 0; font-size: 1.8em; text-transform: uppercase; letter-spacing: 3px; }
        .sub-header { color: var(--gold); font-size: 0.85em; text-transform: uppercase; margin: 3px 0; letter-spacing: 1px; }
        .version-info { color: var(--gold); font-size: 0.65em; opacity: 0.5; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 15px 30px;
        }

        .premium-btn {
            background: rgba(255,255,255,0.03);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.4);
            height: var(--btn-height);
            font-size: 0.75em;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            outline: none;
        }
        
        .premium-btn:active {
            background: rgba(212, 175, 55, 0.2);
        }

        /* Vergrößerte, responsive Lernkarte */
        .flashcard {
            width: 85%;
            max-width: 340px;
            height: 160px; /* Von 125px auf 160px erhöht */
            background: linear-gradient(145deg, #0a0a0a, #000);
            border: 1px solid var(--gold);
            border-radius: 35px;
            margin: 15px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            position: relative;
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.1);
        }

        #phrase-fr { font-size: 1.25em; color: var(--gold); font-weight: bold; margin-bottom: 8px; padding: 0 10px; line-height: 1.3; }
        #phrase-de { font-size: 0.9em; color: #fff; opacity: 0.7; padding: 0 10px; line-height: 1.3; }

        .card-counter-inside {
            position: absolute;
            bottom: 12px;
            right: 25px;
            color: var(--gold);
            font-size: 0.65em;
            font-weight: bold;
        }

        .controls { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 10px 40px;
        }

        .ctrl-btn {
            background: #000;
            color: var(--gold);
            border: 1px solid var(--gold);
            height: var(--btn-height);
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .play-btn { background: var(--gold); color: #000; }

        .menu-footer {
            width: 190px;
            margin: 15px auto 0 auto;
            background: var(--gold);
            color: #000;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 0.5px;
        }

        /* Flexibler Außen-Footer */
        .outer-footer {
            margin: 15px 0 20px 0;
            color: var(--gold);
            font-size: 0.75em;
            letter-spacing: 1px;
            font-weight: bold;
            width: 95%;
            max-width: 420px;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .outer-footer span {
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.8;
        }
        .outer-footer span:hover {
            opacity: 1;
        }

        /* Modal für Impressum / Datenschutz */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0c1a2b;
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 25px;
            width: 80%;
            max-width: 320px;
            max-height: 75vh;
            overflow-y: auto;
            color: #fff;
            font-size: 0.85em;
            position: relative;
            line-height: 1.4;
        }
        .modal-content h3 { color: var(--gold); margin-top: 0; font-size: 1.2em; text-transform: uppercase; }
        .close-modal {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 7px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            float: right;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 0.8em;
        }
    </style>
</head>

    let currentCat = 'welcome';
    let index = 0;
    let autoSpeakActive = false;

    function setCategory(cat) {
        currentCat = cat;
        index = 0;
        autoSpeakActive = true; 
        updateCard();
    }

    function updateCard() {
        const item = data[currentCat][index];
        document.getElementById('phrase-fr').innerText = item.fr;
        document.getElementById('phrase-de').innerText = item.de;
        document.getElementById('counter').innerText = `${index + 1} / ${data[currentCat].length}`;
        if(autoSpeakActive) {
            speak();
        }
    }

    function nextCard() {
        autoSpeakActive = true;
        index = (index + 1) % data[currentCat].length;
        updateCard();
    }

    function prevCard() {
        autoSpeakActive = true;
        index = (index - 1 + data[currentCat].length) % data[currentCat].length;
        updateCard();
    }

    function speak() {
        const text = document.getElementById('phrase-fr').innerText;
        if(text === "Bienvenue" && currentCat === 'welcome' && index === 0 && !autoSpeakActive) return;
        
        window.speechSynthesis.cancel();
        
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'fr-FR';
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }
